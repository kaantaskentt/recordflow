<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#22c55e" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#0a0a0a" stroke="url(#glow)" stroke-width="2"/>
  <!-- Record dot -->
  <circle cx="100" cy="72" r="18" fill="url(#glow)" filter="url(#shadow)"/>
  <!-- Flow arrows - three horizontal lines with arrow hints -->
  <rect x="58" y="108" width="84" height="4" rx="2" fill="#22c55e" opacity="0.9"/>
  <rect x="68" y="122" width="64" height="4" rx="2" fill="#22c55e" opacity="0.6"/>
  <rect x="78" y="136" width="44" height="4" rx="2" fill="#22c55e" opacity="0.35"/>
</svg>
